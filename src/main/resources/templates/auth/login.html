<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng nhập - Ecommerce</title>
<link rel="icon" type="image/png" th:href="@{/images/Logo_dhktdn.png}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">
<style>
    body.bg-light {
        /* subtle background image with light overlay */
        background: linear-gradient(rgba(255,255,255,0.70), rgba(255,255,255,0.70)),
                    url('/images/BackGround.png') center / cover no-repeat fixed;
    }
</style>
</head>
<body class="bg-light">
	<nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/images/Logo_dhktdn.png}" alt="Logo" style="height: 56px; display: inline-block; object-fit: contain;"/>
            </a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav me-auto">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/}">Trang chủ</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/product/list}">Sản phẩm</a>
					</li>
				</ul>
				<ul class="navbar-nav">
					<li class="nav-item">
						<a class="nav-link active" th:href="@{/auth/login}">Đăng nhập</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/auth/register}">Đăng ký</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

    <div class="container py-5">
        <div class="row justify-content-end">
            <div class="col-md-6 col-lg-4">
				<div class="card professional-card shadow">
					<div class="card-header bg-primary text-white">
						<h4 class="mb-0 text-center"><i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập</h4>
					</div>
					<div class="card-body p-4">
                        <div class="text-center mb-4">
							<img src="/images/LogoDAU.png" alt="Logo DAU" class="mb-3" style="height: 60px;">
							<h2 class="text-primary">Đăng nhập</h2>
						</div>
                        <div th:if="${success}" class="alert alert-success" role="alert">
                            <i class="bi bi-check-circle me-2"></i>
                            <span th:text="${success}">Đăng ký thành công! Vui lòng đăng nhập.</span>
                        </div>
						
                        <form th:action="@{/auth/login}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
							<div class="mb-3">
								<label for="username" class="form-label">Tên đăng nhập</label>
								<input type="text" class="form-control" id="username" name="username" required>
							</div>
							
                            <div class="mb-4">
                                <label for="password" class="form-label">Mật khẩu</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                        <i class="bi bi-eye" id="toggleIcon"></i>
                                    </button>
                                </div>
                            </div>
							
                            <div class="mb-3 form-check">
								<input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
								<label class="form-check-label" for="remember-me">
									Ghi nhớ đăng nhập
								</label>
							</div>
							
							<button type="submit" class="btn btn-primary w-100 mb-3">
								<i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
							</button>
						</form>
						
						<div class="text-center">
							<p class="text-muted">Chưa có tài khoản? 
								<a th:href="@{/auth/register}" class="text-decoration-none fw-bold">Đăng ký ngay</a>
							</p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	
	<script>
		document.getElementById('togglePassword').addEventListener('click', function() {
			const passwordInput = document.getElementById('password');
			const toggleIcon = document.getElementById('toggleIcon');
			
			if (passwordInput.type === 'password') {
				passwordInput.type = 'text';
				toggleIcon.classList.remove('bi-eye');
				toggleIcon.classList.add('bi-eye-slash');
			} else {
				passwordInput.type = 'password';
				toggleIcon.classList.remove('bi-eye-slash');
				toggleIcon.classList.add('bi-eye');
			}
		});
		
		document.addEventListener('DOMContentLoaded', function() {
			const rememberMeCheckbox = document.getElementById('remember-me');
			const usernameInput = document.getElementById('username');
			const passwordInput = document.getElementById('password');
			
			// Kiểm tra nếu đã lưu thông tin đăng nhập
			if (localStorage.getItem('rememberUsername') === 'true') {
				const savedUsername = localStorage.getItem('savedUsername');
				if (savedUsername) {
					usernameInput.value = savedUsername;
					rememberMeCheckbox.checked = true;
				}
			}
			
			rememberMeCheckbox.addEventListener('change', function() {
				if (this.checked) {
					localStorage.setItem('rememberUsername', 'true');
					localStorage.setItem('savedUsername', usernameInput.value);
				} else {
					localStorage.removeItem('rememberUsername');
					localStorage.removeItem('savedUsername');
				}
			});
			
			usernameInput.addEventListener('input', function() {
				if (rememberMeCheckbox.checked) {
					localStorage.setItem('savedUsername', this.value);
				}
			});
		});
	</script>
</body>
</html>
