<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quản lý đơn hàng - Admin</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<!-- Custom CSS -->
<link rel="stylesheet" th:href="@{/css/style.css}">
<style>
	/* Cố định navbar - Độ ưu tiên cao nhất */
	body nav.navbar,
	body .navbar,
	nav.navbar {
		position: fixed !important;
		top: 0 !important;
		left: 0 !important;
		right: 0 !important;
		width: 100% !important;
		z-index: 9999 !important;
		margin: 0 !important;
	}
	body.bg-light {
		padding-top: 76px !important;
	}
</style>
</head>
<body class="bg-light">
	<!-- Navigation -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Website Bán Hàng Online - Admin</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav me-auto">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin}">Dashboard</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/products}">Sản phẩm</a>
					</li>
					<li class="nav-item">
						<a class="nav-link active" th:href="@{/admin/orders}">Đơn hàng</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/users}">Người dùng</a>
					</li>
				</ul>
				<ul class="navbar-nav">
					<li class="nav-item">
						<span class="navbar-text me-3">Admin: <strong th:text="${#authentication.name}"></strong></span>
					</li>
					<li class="nav-item">
						<form th:action="@{/auth/logout}" method="post" class="d-inline">
							<button type="submit" class="btn btn-link nav-link text-white p-0 border-0">Đăng xuất</button>
						</form>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="container-fluid py-4">
		<div class="row">
			<div class="col-12">
				<h2 class="text-primary mb-4">
					<i class="bi bi-clipboard-check me-2"></i>Quản lý đơn hàng
				</h2>

				<!-- Orders Table -->
				<div class="card">
					<div class="card-body">
						<div class="table-responsive">
							<table class="table table-hover">
								<thead class="table-dark">
									<tr>
										<th>ID</th>
										<th>Khách hàng</th>
										<th>Tổng tiền</th>
										<th>Trạng thái</th>
										<th>Ngày tạo</th>
										<th>Thao tác</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="order : ${orders}">
										<td th:text="${order.id}"></td>
										<td th:text="${order.user.username}"></td>
										<td class="text-success fw-bold" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
										<td>
											<span th:if="${order.status == 'NEW'}" class="badge bg-primary">Mới</span>
											<span th:if="${order.status == 'APPROVED'}" class="badge bg-warning">Đã duyệt</span>
											<span th:if="${order.status == 'PAID'}" class="badge bg-success">Đã thanh toán</span>
											<span th:if="${order.status == 'CANCELLED'}" class="badge bg-danger">Đã hủy</span>
										</td>
										<td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
										<td>
											<div class="btn-group" role="group">
												<a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-info">
													<i class="bi bi-eye"></i>
												</a>
												<form th:action="@{/admin/orders/{id}/approve(id=${order.id})}" method="post" class="d-inline" th:if="${order.status == 'NEW'}">
													<button type="submit" class="btn btn-sm btn-outline-success">
														<i class="bi bi-check"></i>
													</button>
												</form>
												<form th:action="@{/admin/orders/{id}/cancel(id=${order.id})}" method="post" class="d-inline" th:if="${order.status != 'CANCELLED'}">
													<button type="submit" class="btn btn-sm btn-outline-danger" 
															onclick="return confirm('Bạn có chắc muốn hủy đơn hàng này?')">
														<i class="bi bi-x"></i>
													</button>
												</form>
											</div>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
