<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quản lý người dùng - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">
<style>
	/* Cố định navbar - Độ ưu tiên cao nhất */
	body nav.navbar,
	body .navbar,
	nav.navbar {
		position: fixed !important;
		top: 0 !important;
		left: 0 !important;
		right: 0 !important;
		width: 100% !important;
		z-index: 9999 !important;
		margin: 0 !important;
	}
	body.bg-light {
		padding-top: 76px !important;
	}
</style>
</head>
<body class="bg-light">
	<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Website Bán Hàng Online - Admin</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav me-auto">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin}">Dashboard</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/products}">Sản phẩm</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/orders}">Đơn hàng</a>
					</li>
					<li class="nav-item">
						<a class="nav-link active" th:href="@{/admin/users}">Người dùng</a>
					</li>
				</ul>
				<ul class="navbar-nav">
					<li class="nav-item">
						<span class="navbar-text me-3">Admin: <strong th:text="${#authentication.name}"></strong></span>
					</li>
					<li class="nav-item">
						<form th:action="@{/auth/logout}" method="post" class="d-inline">
							<button type="submit" class="btn btn-link nav-link text-white p-0 border-0">Đăng xuất</button>
						</form>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="container-fluid py-4">
		<div class="row">
			<div class="col-12">
				<h2 class="text-primary mb-4">
					<i class="bi bi-people me-2"></i>Quản lý người dùng
				</h2>

				<div class="card">
					<div class="card-body">
						<div class="table-responsive">
							<table class="table table-hover">
								<thead class="table-dark">
									<tr>
										<th>ID</th>
										<th>Tên đăng nhập</th>
										<th>Email</th>
										<th>Vai trò</th>
										<th>Trạng thái</th>
										<th>Thao tác</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="user : ${users}">
										<td th:text="${user.id}"></td>
										<td>
											<strong th:text="${user.username}"></strong>
										</td>
										<td th:text="${user.email}"></td>
										<td>
											<span th:if="${user.role == 'ROLE_ADMIN'}" class="badge bg-danger">Admin</span>
											<span th:if="${user.role == 'ROLE_USER'}" class="badge bg-primary">User</span>
										</td>
										<td>
											<span th:if="${user.enabled}" class="badge bg-success">Hoạt động</span>
											<span th:unless="${user.enabled}" class="badge bg-secondary">Tạm khóa</span>
										</td>
										<td>
											<div class="btn-group" role="group">
												<a th:href="@{/admin/users/{id}(id=${user.id})}" class="btn btn-sm btn-outline-info">
													<i class="bi bi-eye"></i>
												</a>
												<a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-outline-primary">
													<i class="bi bi-pencil"></i>
												</a>
												<form th:action="@{/admin/users/{id}/toggle(id=${user.id})}" method="post" class="d-inline">
													<button type="submit" class="btn btn-sm btn-outline-warning" 
															th:text="${user.enabled ? 'Khóa' : 'Mở khóa'}">
														<i class="bi bi-lock"></i>
													</button>
												</form>
												<form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="d-inline">
													<button type="submit" class="btn btn-sm btn-outline-danger" 
															onclick="return confirm('Bạn có chắc muốn xóa người dùng này?')">
														<i class="bi bi-trash"></i>
													</button>
												</form>
											</div>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
