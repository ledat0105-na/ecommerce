<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chi tiết người dùng - Admin</title>
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<!-- Custom CSS -->
<link rel="stylesheet" th:href="@{/css/style.css}">
<style>
	/* Cố định navbar - Độ ưu tiên cao nhất */
	body nav.navbar,
	body .navbar,
	nav.navbar {
		position: fixed !important;
		top: 0 !important;
		left: 0 !important;
		right: 0 !important;
		width: 100% !important;
		z-index: 9999 !important;
		margin: 0 !important;
	}
	body.bg-light {
		padding-top: 76px !important;
	}
</style>
</head>
<body class="bg-light">
	<!-- Navigation -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Website Bán Hàng Online - Admin</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav me-auto">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin}">Dashboard</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/products}">Sản phẩm</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/orders}">Đơn hàng</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/admin/users}">Người dùng</a>
					</li>
				</ul>
				<ul class="navbar-nav">
					<li class="nav-item">
						<span class="navbar-text me-3">Admin: <strong th:text="${#authentication.name}"></strong></span>
					</li>
					<li class="nav-item">
						<form th:action="@{/auth/logout}" method="post" class="d-inline">
							<button type="submit" class="btn btn-link nav-link text-white p-0 border-0">Đăng xuất</button>
						</form>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="container py-4">
		<div class="row justify-content-center">
			<div class="col-lg-8">
				<!-- Breadcrumb -->
				<nav aria-label="breadcrumb" class="mb-4">
					<ol class="breadcrumb">
						<li class="breadcrumb-item"><a th:href="@{/admin}">Dashboard</a></li>
						<li class="breadcrumb-item"><a th:href="@{/admin/users}">Người dùng</a></li>
						<li class="breadcrumb-item active">Chi tiết</li>
					</ol>
				</nav>

				<div class="card">
					<div class="card-header">
						<h4 class="card-title mb-0">
							<i class="bi bi-person me-2"></i>Chi tiết người dùng
						</h4>
					</div>
					<div class="card-body">
						<div class="row g-3">
							<div class="col-md-6">
								<label class="form-label fw-bold">ID:</label>
								<p th:text="${user.id}"></p>
							</div>
							
							<div class="col-md-6">
								<label class="form-label fw-bold">Tên đăng nhập:</label>
								<p th:text="${user.username}"></p>
							</div>
							
							<div class="col-md-6">
								<label class="form-label fw-bold">Email:</label>
								<p th:text="${user.email}"></p>
							</div>
							
							<div class="col-md-6">
								<label class="form-label fw-bold">Vai trò:</label>
								<p>
									<span th:if="${user.role == 'ROLE_ADMIN'}" class="badge bg-danger">Admin</span>
									<span th:if="${user.role == 'ROLE_USER'}" class="badge bg-primary">User</span>
								</p>
							</div>
							
							<div class="col-md-6">
								<label class="form-label fw-bold">Trạng thái:</label>
								<p>
									<span th:if="${user.enabled}" class="badge bg-success">Hoạt động</span>
									<span th:unless="${user.enabled}" class="badge bg-secondary">Tạm khóa</span>
								</p>
							</div>
						</div>
						
						<div class="d-flex justify-content-between mt-4">
							<a th:href="@{/admin/users}" class="btn btn-outline-secondary">
								<i class="bi bi-arrow-left me-2"></i>Quay lại
							</a>
							<div>
								<a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-primary">
									<i class="bi bi-pencil me-2"></i>Chỉnh sửa
								</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
